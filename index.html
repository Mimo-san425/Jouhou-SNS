<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title><ruby>SNS<rt>エスエヌエス</rt></ruby><ruby>判断<rt>はんだん</rt></ruby><ruby>ゲーム<rt>げーむ</rt></ruby></title>
<style>
  body{
    margin:0;
    font-family:"UD デジタル教科書体","Yu Gothic",sans-serif;
    background:#fff6c7;
    text-align:center;
  }
  h1{font-size:34px;margin:14px;}
  button{
    font-family:inherit;
    font-size:30px;
    padding:16px 28px;
    margin:8px;
    border:0;
    border-radius:18px;
    color:white;
    cursor:pointer;
  }
  .mainCard{
    background:white;
    border:6px solid #ddd;
    border-radius:28px;
    width:86%;
    max-width:900px;
    margin:20px auto;
    padding:28px;
    box-shadow:0 5px 14px #9996;
  }
  .pic{font-size:110px;margin:10px;}
  .question{
    font-size:36px;
    font-weight:bold;
    margin:18px;
  }
  .good{background:#178bd3;}
  .unknown{background:#d6a900;}
  .bad{background:#d7375f;}
  .next{background:#333;}
  .selected{
    font-size:34px;
    font-weight:bold;
    margin:16px;
  }
  #summary,#ruleScreen{display:none;padding:18px;}
  .summaryBox,.ruleBox,#myRule{
    background:white;
    border:5px solid #ddd;
    border-radius:22px;
    padding:18px;
    margin:14px auto;
    max-width:900px;
    font-size:28px;
    text-align:left;
  }
  .ruleBox h2{font-size:30px;margin:0 0 10px;}
  .choice{
    display:block;
    background:#f4f4f4;
    border:4px solid #ddd;
    border-radius:18px;
    padding:16px;
    margin:10px 0;
    font-size:28px;
  }
  .choice input{
    transform:scale(1.7);
    margin-right:14px;
  }

  /* ふりがな見やすく */
  ruby{ ruby-position: over; }
  rt{
    font-size:0.55em;
    letter-spacing:0.02em;
  }
</style>
</head>
<body>

<div id="gameScreen">
  <h1>
    <ruby>全員<rt>ぜんいん</rt></ruby>が
    <ruby>見<rt>み</rt></ruby>られる
    <ruby>SNS<rt>エスエヌエス</rt></ruby>に
    <ruby>公開<rt>こうかい</rt></ruby>していい？
  </h1>

  <div class="mainCard">
    <div id="count" style="font-size:26px;"></div>
    <div class="pic" id="pic"></div>
    <div class="question" id="text"></div>

    <button class="good" onclick="answer('良い')"><ruby>良<rt>よ</rt></ruby>い</button>
    <button class="unknown" onclick="answer('わからない')">わからない</button>
    <button class="bad" onclick="answer('ダメ')">ダメ</button>

    <div class="selected" id="selected">
      まだ<ruby>選<rt>えら</rt></ruby>んでいません
    </div>

    <button class="next" onclick="nextCard()"><ruby>次<rt>つぎ</rt></ruby>へ</button>
  </div>
</div>

<div id="summary">
  <h1>
    <ruby>考<rt>かんが</rt></ruby>えたことを
    <ruby>確認<rt>かくにん</rt></ruby>しよう
  </h1>
  <div class="summaryBox" id="summaryList"></div>
  <button class="next" onclick="showRuleScreen()">
    <ruby>自分<rt>じぶん</rt></ruby>ルールへ
  </button>
  <button class="next" onclick="restart()">
    もう<ruby>一回<rt>いっかい</rt></ruby>
  </button>
</div>

<div id="ruleScreen">
  <h1>
    <ruby>自分<rt>じぶん</rt></ruby>ルールを
    <ruby>選<rt>えら</rt></ruby>ぼう
  </h1>
  <div id="ruleQuestions"></div>
  <button class="next" onclick="showMyRule()">
    <ruby>自分<rt>じぶん</rt></ruby>ルールを<ruby>表示<rt>ひょうじ</rt></ruby>
  </button>
  <button class="next" onclick="restart()">
    <ruby>最初<rt>さいしょ</rt></ruby>にもどる
  </button>
  <div id="myRule"></div>
</div>

<script>
const cards=[
  ["🍰","<ruby>自分<rt>じぶん</rt></ruby>で<ruby>作<rt>つく</rt></ruby>ったケーキ"],
  ["👥","<ruby>友<rt>とも</rt></ruby>だちと<ruby>一緒<rt>いっしょ</rt></ruby>に<ruby>撮<rt>と</rt></ruby>った<ruby>写真<rt>しゃしん</rt></ruby>"],
  ["🏯","<ruby>去年、旅行<rt>きょねん　りょこう</rt></ruby>で<ruby>撮<rt>と</rt></ruby>った<ruby>風景<rt>ふうけい</rt></ruby>の<ruby>写真<rt>しゃしん</rt></ruby>"],
  ["✉️","<ruby>住所<rt>じゅうしょ</rt></ruby>が<ruby>写<rt>うつ</rt></ruby>った<ruby>写真<rt>しゃしん</rt></ruby>"],
  ["🏠","<ruby>自分<rt>じぶん</rt></ruby>の<ruby>家<rt>いえ</rt></ruby>が<ruby>写<rt>うつ</rt></ruby>った<ruby>写真<rt>しゃしん</rt></ruby>"],
  ["📸","<ruby>人<rt>ひと</rt></ruby>をこっそり<ruby>撮<rt>と</rt></ruby>った<ruby>写真<rt>しゃしん</rt></ruby>"]
];

const rules=[
  ["<ruby>友達<rt>ともだち</rt></ruby>の<ruby>顔<rt>かお</rt></ruby>が<ruby>写<rt>うつ</rt></ruby>っていたら？",[
    "<ruby>友達<rt>ともだち</rt></ruby>の<ruby>名前<rt>なまえ</rt></ruby>を<ruby>書<rt>か</rt>いて</ruby><ruby>公開<rt>こうかい</rt>する</ruby>",
    "とりあえず<ruby>公開<rt>こうかい</rt></ruby>しない",
    "そのまま<ruby>公開<rt>こうかい</rt></ruby>する"
  ]],
  ["<ruby>住所<rt>じゅうしょ</rt></ruby>や<ruby>学校名<rt>がっこうめい</rt></ruby>が<ruby>写<rt>うつ</rt></ruby>っていたら？",[
    "<ruby>公開<rt>こうかい</rt></ruby>しない",
    "<ruby>少<rt>すこ</rt></ruby>しなら<ruby>公開<rt>こうかい</rt></ruby>する",
    "<ruby>気<rt>き</rt></ruby>にせず<ruby>公開<rt>こうかい</rt></ruby>する"
  ]],
  ["<ruby>友<rt>とも</rt></ruby>だちがいやがりそうなら？",[
    "<ruby>公開<rt>こうかい</rt></ruby>しない",
    "あとで<ruby>消<rt>け</rt></ruby>せばよい",
    "<ruby>笑<rt>わら</rt></ruby>えるなら<ruby>公開<rt>こうかい</rt></ruby>する"
  ]],
  ["<ruby>迷<rt>まよ</rt></ruby>ったときは？",[
    "<ruby>公開<rt>こうかい</rt></ruby>しない",
    "<ruby>先生<rt>せんせい</rt></ruby>や<ruby>家族<rt>かぞく</rt></ruby>に<ruby>相談<rt>そうだん</rt></ruby>する",
    "<ruby>自分<rt>じぶん</rt></ruby>だけで<ruby>決<rt>き</rt></ruby>める"
  ]],
  ["<ruby>公開<rt>こうかい</rt></ruby>する<ruby>前<rt>まえ</rt></ruby>に？",[
    "<ruby>人<rt>ひと</rt></ruby>を<ruby>傷<rt>きず</rt></ruby>つけないか、<ruby>個人情報<rt>こじんじょうほう</rt></ruby>がないか<ruby>確認<rt>かくにん</rt></ruby>する",
    "いいねが<ruby>増<rt>ふ</rt></ruby>えるかだけ<ruby>考<rt>かんが</rt></ruby>える",
    "<ruby>何<rt>なに</rt></ruby>も<ruby>考<rt>かんが</rt></ruby>えない"
  ]]
];

let now=0;
let answers=Array(cards.length).fill("未選択");

function showCard(){
  document.getElementById("count").textContent=(now+1)+" / "+cards.length;
  document.getElementById("pic").textContent=cards[now][0];
  document.getElementById("text").innerHTML=cards[now][1];

  document.getElementById("selected").innerHTML =
    answers[now]==="未選択"
      ? "まだ<ruby>選<rt>えら</rt></ruby>んでいません"
      : "<ruby>選<rt>えら</rt></ruby>んだもの： " + answers[now];
}

function answer(a){
  answers[now]=a;
  document.getElementById("selected").innerHTML="<ruby>選<rt>えら</rt></ruby>んだもの： "+a;
}

function nextCard(){
  if(now<cards.length-1){
    now++;
    showCard();
  }else{
    showSummary();
  }
}

function showSummary(){
  document.getElementById("gameScreen").style.display="none";
  document.getElementById("summary").style.display="block";

  let html="";
  cards.forEach((c,i)=>{
    html+=`・${stripRuby(c[1])} → <b>${answers[i]}</b><br>`;
  });
  document.getElementById("summaryList").innerHTML=html;
}

function showRuleScreen(){
  document.getElementById("summary").style.display="none";
  document.getElementById("ruleScreen").style.display="block";

  const area=document.getElementById("ruleQuestions");
  area.innerHTML="";

  rules.forEach((r,i)=>{
    let html=`<div class="ruleBox"><h2>${i+1}. ${r[0]}</h2>`;
    r[1].forEach(choice=>{
      html+=`<label class="choice"><input type="radio" name="rule${i}" value="${escapeHtml(choice)}">${choice}</label>`;
    });
    html+=`</div>`;
    area.innerHTML+=html;
  });
}

function showMyRule(){
  let html="<b>わたしの<ruby>自分<rt>じぶん</rt></ruby>ルール</b><br>（SNSにのせるまえの<ruby>約束<rt>やくそく</rt></ruby>）<br><br>";

  rules.forEach((r,i)=>{
    const checked=document.querySelector(`input[name="rule${i}"]:checked`);

    // 問題文＋答えをセット表示
    html += "・" + stripRuby(r[0]) + "<br>";
    html += "　→ " + (checked ? checked.value : "まだ<ruby>選<rt>えら</rt></ruby>んでいません") + "<br><br>";
  });

  document.getElementById("myRule").innerHTML=html;
}

function restart(){
  now=0;
  answers=Array(cards.length).fill("未選択");
  document.getElementById("gameScreen").style.display="block";
  document.getElementById("summary").style.display="none";
  document.getElementById("ruleScreen").style.display="none";
  document.getElementById("myRule").innerHTML="";
  showCard();
}

/* まとめ表示用：rubyを外して文字だけにする */
function stripRuby(html){
  return html.replace(/<rt>.*?<\/rt>/g,"").replace(/<\/?ruby>/g,"");
}

/* ラジオのvalueに入れるため最低限エスケープ */
function escapeHtml(str){
  return str.replaceAll('"','&quot;');
}

showCard();
</script>

</body>
</html>
